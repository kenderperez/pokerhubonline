<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de Carga - Ficha 3D</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212; /* Fondo oscuro de pantalla de carga */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenedor del Canvas 3D */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Texto de Carga */
        .loading-text {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 1.5rem;
            letter-spacing: 5px;
            z-index: 2;
            text-transform: uppercase;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Viñeta para darle un toque más cinematográfico */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: 0 0 200px rgba(0,0,0,0.9) inset;
            z-index: 1;
            pointer-events: none;
        }
    </style>
    <!-- Importamos la librería Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="vignette"></div>
    <div class="loading-text">Cargando...</div>

    <script>
        // 1. CONFIGURACIÓN BÁSICA DE LA ESCENA
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 45; // Alejar la cámara

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Para pantallas de alta resolución
        renderer.shadowMap.enabled = true; // Habilitar sombras
        container.appendChild(renderer.domElement);

        // 2. GENERADOR DE TEXTURAS VÍA CANVAS (Recrea tu imagen)
        // Esto crea el diseño de la ficha dinámicamente en alta resolución
        function createChipFaceTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            const center = 512;

            // Fondo Blanco base
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, 1024, 1024);

            // Anillo exterior negro
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(center, center, 500, 0, Math.PI * 2);
            ctx.fill();

            // Muescas blancas (creando el efecto de engranaje)
            ctx.fillStyle = '#FFFFFF';
            for (let i = 0; i < 6; i++) {
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(i * (Math.PI / 3));
                // Dibujamos rectángulos desde el centro para hacer las muescas
                ctx.fillRect(-120, -512, 240, 300); 
                ctx.restore();
            }

            // Anillo intermedio blanco (tapa el interior de las muescas)
            ctx.beginPath();
            ctx.arc(center, center, 360, 0, Math.PI * 2);
            ctx.fill();

            // Círculo Central Rojo
            ctx.fillStyle = '#D30000'; // Rojo vibrante de casino
            ctx.beginPath();
            ctx.arc(center, center, 290, 0, Math.PI * 2);
            ctx.fill();

            // Símbolo de Pica (Spade)
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 400px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Ajuste sutil en 'y' porque el centro de las fuentes varía
            ctx.fillText('♠', center, center + 30); 

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy(); // Mejora la nitidez en ángulos
            return texture;
        }

        // Textura para el borde (grosor) de la ficha (Rayas blancas y negras)
        function createChipEdgeTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, 1024, 64);
            
            ctx.fillStyle = '#FFFFFF';
            for(let i=0; i<6; i++) {
                // Sincronizado con las 6 muescas de la cara
                ctx.fillRect(i * (1024/6) + 30, 0, 100, 64); 
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        // 3. CREACIÓN DEL MODELO 3D (CILINDRO)
        const radius = 4;
        const thickness = 0.5;
        // Radio sup, Radio inf, altura, segmentos radiales (alto para que sea suave)
        const geometry = new THREE.CylinderGeometry(radius, radius, thickness, 64); 

        // Materiales Hiperrealistas (MeshPhysicalMaterial)
        const faceTexture = createChipFaceTexture();
        const edgeTexture = createChipEdgeTexture();

        const commonMaterialProps = {
            roughness: 0.3, // Un poco brillante pero no un espejo
            metalness: 0.1, // Material de resina/cerámica
            clearcoat: 0.5, // Añade una capa de brillo similar al plástico pulido
            clearcoatRoughness: 0.2
        };

        const topBottomMaterial = new THREE.MeshPhysicalMaterial({ 
            ...commonMaterialProps, 
            map: faceTexture 
        });

        const edgeMaterial = new THREE.MeshPhysicalMaterial({ 
            ...commonMaterialProps, 
            map: edgeTexture 
        });

        // El cilindro tiene 3 partes: Borde (0), Tapa superior (1), Tapa inferior (2)
        const materials = [edgeMaterial, topBottomMaterial, topBottomMaterial];

        const chip = new THREE.Mesh(geometry, materials);
        
        // Inclinamos la ficha para que se vea la cara y el borde al girar
        chip.rotation.x = Math.PI / 2.5; 
        chip.rotation.z = Math.PI / 8;
        
        // La ficha emite sombra
        chip.castShadow = true;
        chip.receiveShadow = true;
        
        scene.add(chip);

        // 4. ILUMINACIÓN (Crucial para el hiperrealismo)
        // Luz ambiental suave
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        // Luz principal (simula un foco desde arriba)
        const spotLight = new THREE.SpotLight(0xffffff, 1.5);
        spotLight.position.set(10, 20, 10);
        spotLight.angle = Math.PI / 6;
        spotLight.penumbra = 0.5;
        scene.add(spotLight);

        // Luz secundaria azulada/fría para dar contraste cinemático
        const pointLight = new THREE.PointLight(0x88ccff, 1, 50);
        pointLight.position.set(-10, -10, 10);
        scene.add(pointLight);

        // 5. ANIMACIÓN (Bucle principal)
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Giro constante sobre su eje (la Y del cilindro)
            chip.rotation.y -= 0.03; 

            // Movimiento suave de "flotación" (levitar arriba y abajo)
            chip.position.y = Math.sin(elapsedTime * 2) * 0.3;

            renderer.render(scene, camera);
        }

        animate();

        // 6. RESPONSIVIDAD (Si se redimensiona la ventana)
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
