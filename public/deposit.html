<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cajero Web3 - Comprar Fichas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f111a; --card: #1b1d27; --accent: #6a5ce7; 
            --green: #2ed573; --text: #ffffff; --muted: #757b8c;
        }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; display: flex;
            justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .deposit-card {
            background: var(--card); padding: 40px; border-radius: 20px;
            width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #2b2e3d; text-align: center;
        }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 30px; color: var(--accent); }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
        input {
            width: 100%; background: #13141c; border: 1px solid #333;
            padding: 12px; border-radius: 10px; color: white; font-size: 16px; outline: none;
        }
        .rate-info {
            background: rgba(106, 92, 231, 0.1); padding: 15px;
            border-radius: 10px; margin-bottom: 25px; font-size: 14px; color: var(--muted);
        }
        .btn-pay {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer;
            transition: 0.2s; font-size: 16px;
        }
        .btn-pay:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-pay:disabled { background: #444; cursor: not-allowed; transform: none; }
        
        #status-msg { margin-top: 20px; font-size: 13px; }
        .success { color: var(--green); }
        .error { color: #ff4757; }
    </style>
</head>
<body>

    <div class="deposit-card">
        <div class="logo">♠ PRO POKER CASHIER</div>
        
        <div class="input-group">
            <label>Cantidad a depositar (ETH/BNB/MATIC)</label>
            <input type="number" id="crypto-amount" placeholder="0.01" step="0.001" oninput="calculateChips()">
        </div>

        <div class="rate-info">
            Recibirás aproximadamente:<br>
            <span id="chips-preview" style="color: var(--green); font-size: 20px; font-weight: bold;">0</span>
            <span style="color: var(--green);"> FICHAS</span>
        </div>

        <button class="btn-pay" id="btn-deposit" onclick="executeDeposit()">ENVIAR DEPÓSITO</button>
        
        <div id="status-msg"></div>

        <div style="margin-top: 30px; font-size: 11px; color: var(--muted);">
            Conectado: <span id="user-address">No detectado</span>
        </div>
    </div>

    <script>
        const CHIPS_PER_ETH = 10000; // Tasa de cambio: 1 ETH = 10,000 Fichas
        const TREASURY_ADDRESS = "0xTU_DIRECCION_DE_BILLETERA_AQUI"; // Reemplaza con tu wallet

        async function init() {
            if (window.ethereum) {
                const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('user-address').innerText = accounts[0].slice(0,6) + '...' + accounts[0].slice(-4);
            } else {
                alert("Instala MetaMask para continuar");
            }
        }

        function calculateChips() {
            const eth = document.getElementById('crypto-amount').value;
            const chips = eth * CHIPS_PER_ETH;
            document.getElementById('chips-preview').innerText = chips.toLocaleString();
        }

        async function executeDeposit() {
            const amount = document.getElementById('crypto-amount').value;
            if (!amount || amount <= 0) return alert("Ingresa una cantidad válida");

            const status = document.getElementById('status-msg');
            const btn = document.getElementById('btn-deposit');

            try {
                btn.disabled = true;
                status.innerHTML = "Esperando confirmación en MetaMask...";
                status.className = "";

                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();

                // Enviar la transacción a la tesorería del Poker
                const tx = await signer.sendTransaction({
                    to: TREASURY_ADDRESS,
                    value: ethers.utils.parseEther(amount.toString())
                });

                status.innerHTML = "Transacción enviada. Esperando confirmación de red...";
                
                const receipt = await tx.wait(); // Esperar a que se mine

                status.innerHTML = `<span class="success">¡DEPÓSITO EXITOSO!<br>Las fichas se acreditarán en breve.</span>`;
                console.log("TX Hash:", receipt.transactionHash);

                // IMPORTANTE: Aquí el frontend debería avisar al backend
                // socket.emit('verifyDeposit', { txHash: receipt.transactionHash, user: await signer.getAddress() });

            } catch (err) {
                console.error(err);
                status.innerHTML = `<span class="error">Error: ${err.message.slice(0, 40)}...</span>`;
                btn.disabled = false;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
