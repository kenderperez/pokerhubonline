<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob: filesystem:; font-src * data: blob:; script-src * 'unsafe-inline' 'unsafe-eval' data: blob:; style-src * 'unsafe-inline' data: blob:; img-src * data: blob: filesystem:; connect-src * data: blob:; object-src *; media-src *; frame-src *;">
    <title>Web3 Poker PRO - Premium Lobby</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- PANTALLA DE CARGA 3D -->
    <div id="loading-screen">
        <div id="canvas-container-loading"></div>
        <div class="vignette"></div>
        <div class="loading-text">Cargando mesa...</div>
    </div>

    <!-- LOBBY OVERLAY -->
    <div id="lobby-overlay">
        <div class="lobby-box">
            <div style="font-size: 24px; font-weight: bold; color: var(--accent); margin-bottom: 20px;">♠ POKERHUB</div>
            
            <div id="profile-setup">
                <p style="color:var(--muted); font-size:12px; margin-bottom:20px;">Ingresa tu nombre para comenzar</p>
                <input type="text" id="player-name" class="lobby-input" placeholder="Tu Nombre / Nickname">
                <button class="btn-act" id="btn-entrar-lobby" style="background:linear-gradient(90deg, #ff0000, #f53); width:100%; font-size:16px; margin-top:10px;">ENTRAR AL LOBBY</button>
            </div>

            <div id="lobby-controls" style="display:none; margin-top:20px;">
                <button class="btn-act" style="background:linear-gradient(90deg, #ff0000, #f53); width:100%; margin-bottom:20px; font-size: 16px; height: 50px;" onclick="startMatchmaking()">
                    ⚡ PARTIDA RÁPIDA (Matchmaking)
                </button>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                    <div style="text-align: left;">
                        <label style="color: #888; font-size: 10px; font-weight: bold;">TIPO DE FICHA</label>
                        <select id="room-type-select" class="lobby-input">
                            <option value="free">GRATIS</option>
                            <option value="paid">PAID (CRYPTO)</option>
                        </select>
                    </div>
                    <div style="text-align: left;">
                        <label style="color: #888; font-size: 10px; font-weight: bold;">VISIBILIDAD</label>
                        <select id="room-visibility-select" class="lobby-input">
                            <option value="public">PÚBLICA</option>
                            <option value="private">PRIVADA</option>
                        </select>
                    </div>
                </div>

                <button class="btn-act" style="background:linear-gradient(90deg, #ff0000, #f53); width:100%; margin-bottom:20px;" onclick="createRoom()">
                    ➕ CREAR NUEVA SALA
                </button>
                
                <div style="margin: 15px 0; border-top: 1px solid #333; padding-top: 15px;">
                    <div style="color: #ffd700; font-size: 12px; font-weight: bold; margin-bottom: 10px; text-align: left; display: flex; justify-content: space-between;">
                        <span>🌐 SALAS PÚBLICAS</span>
                        <span style="color: #555; font-weight: normal; font-size: 10px;">Actualizado en vivo</span>
                    </div>
                    <div id="public-rooms-list" style="max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px;">
                        <div style="color:#555; font-size:11px; text-align:center; padding:20px;">No hay salas públicas activas.</div>
                    </div>
                </div>

                <div style="margin-top: 20px; display: flex; gap: 5px;">
                    <input type="text" id="room-input" placeholder="CÓDIGO PRIVADO" class="lobby-input" style="flex: 2; margin: 0;">
                    <button class="btn-act" style="background:#333; flex: 1;" onclick="joinRoom()">UNIRSE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- INTERFAZ PRINCIPAL DE JUEGO -->
    <div id="game-interface">
        <!-- Botón Home -->
        <button id="home-btn" class="home-button">← Salir</button>

        <div class="main-content">
            <div class="top-header">
                <div style="font-size: 20px; font-weight: bold; color: var(--accent);">POKERHUB</div>
                <div id="room-info-display" style="color:#ff0000; font-weight:bold;">SALA: ---</div>
                <div style="display: flex;">
                    <div id="ficha" style="display: flex;">
                        <div style="width:20px; height:20px; background: conic-gradient(#d4af37, #b8860b, #d4af37); border-radius:50%;"></div>
                        <div id="my-balance" style="margin-left: 10px; color:white; font-weight:bold; font-size:18px;">$0</div>
                    </div>
                </div>
            </div>

            <div class="poker-area">
                <div class="table-wrapper">
                    <div class="table-border">
                        <div class="poker-table" id="poker-table" style="width: 100%; height: 100%; margin: 0; position: relative;">
                            <div class="pot-container" id="pot-display">
                                <div class="pot-badge">
                                    <div class="poker-chip"></div>
                                    <span id="pot-text-content">0.0 BB ($0)</span>
                                </div>
                            </div>  
                            <div id="community-cards"></div>
                        </div>
                    </div>
                </div>            
            </div>
        </div>

    <!-- DEPOSIT CARD -->
    <div class="deposit-card" id="deposit-card">
        <div class="logo">♠ PRO POKER CASHIER</div>
        <div class="input-group">
            <label>Cantidad a depositar (ETH/BNB/MATIC)</label>
            <input type="number" id="crypto-amount" placeholder="0.01" step="0.001" oninput="calculateChips()">
        </div>
        <div class="rate-info">
            Recibirás aproximadamente:<br>
            <span id="chips-preview" style="color: var(--green); font-size: 20px; font-weight: bold;">0</span>
            <span style="color: var(--green);"> FICHAS</span>
        </div>
        <button class="btn-pay" id="btn-deposit" onclick="executeDeposit()">ENVIAR DEPÓSITO</button>
        <div id="status-msg"></div>
        <div style="margin-top: 30px; font-size: 11px; color: var(--muted);">
            Conectado: <span id="user-address">No detectado</span>
        </div>
    </div>

    <div id="chip-rain-container"></div>

    <!-- Módulos JS -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
